name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build binaries for each architecture ─────────────────────────────────
  build-binaries:
    name: Build binary (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - arch: amd64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - arch: arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libssl-dev libcurl4-openssl-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/floci-duck

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: floci-duck-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/floci-duck
          retention-days: 1

  # ── Push multi-arch Docker image ──────────────────────────────────────────
  push-docker:
    name: Push Docker image
    needs: build-binaries
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Download amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: floci-duck-amd64
          path: bin/amd64/

      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: floci-duck-arm64
          path: bin/arm64/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.package
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            floci/floci-duck:${{ steps.version.outputs.version }}
            floci/floci-duck:latest
